<!doctype html>
<html lang="zh-CN" data-theme="light">

    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>Brandflow</title>
    <script>"use strict";
      (() => {
        var t = localStorage.getItem("bf-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
        var l = localStorage.getItem("bf-layout");
        if (l === "compact") {
          document.documentElement.setAttribute("data-layout", l);
        }
      })();
    </script>
    <script type="module" crossorigin src="./assets/index-CoMBOjzA.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-Jd-aogJo.css">

  </body>
</html>
